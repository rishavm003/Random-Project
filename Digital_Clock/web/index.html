<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Clock</title>
    <meta name="description" content="A premium, glassmorphism-inspired digital clock with dynamic animations and sleek design.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clock-card" id="clock-card">
            <h1 class="title">DIGITAL CLOCK</h1>
            <div class="time-display" id="time-display">00:00:00</div>
            <div class="date-display" id="date-display">Monday, April 27, 2026</div>
            <div class="controls">
                <button id="format-toggle" title="Toggle 12/24h format">24H</button>
                <button id="theme-toggle" title="Toggle glass effect">GLASS</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
