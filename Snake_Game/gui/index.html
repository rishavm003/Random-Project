<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Premium Edition</title>
    <meta name="description" content="A modern, neon-inspired Snake game with smooth animations and a premium glassmorphism UI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="stats-panel">
                <div class="stat-box">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">000</span>
                </div>
                <div class="stat-box">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">000</span>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="snakeGame" width="400" height="400"></canvas>
                <div id="overlay" class="overlay">
                    <div class="content">
                        <h1 id="status-title">NEON SNAKE</h1>
                        <p id="status-msg">Press any key to start</p>
                        <button id="start-btn">START GAME</button>
                    </div>
                </div>
            </div>

            <div class="game-controls">
                <button id="pause-btn" class="control-btn" disabled>PAUSE</button>
                <button id="stop-btn" class="control-btn" disabled>STOP</button>
            </div>

            <div class="controls-hint">
                <p>Use <b>Arrow Keys</b> or <b>WASD</b> to control | <b>P</b> to Pause</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
